<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renkli Kum Bulmacası | Sandtrix</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
    <div class="app-container">
        <!-- Game Cabinet -->
        <div class="game-cabinet">
            <!-- Top Dashboard -->
            <div class="dashboard">
                <div class="high-score-box">
                    <span class="trophy">🏆</span>
                    <span id="high-score-value" class="value">0</span>
                </div>
                
                <div class="score-box">
                    <span class="score-icon">✨</span>
                    <span id="score-value" class="value">0</span>
                </div>
            </div>

            <!-- Board Area (Canvas Wrapper) -->
            <div class="board-wrapper">
                <canvas id="game-canvas" width="300" height="400"></canvas>
                
                <!-- Red Warning Line -->
                <div class="warning-line"></div>

                <!-- Screen Overlays -->
                <!-- Start Screen -->
                <div id="start-screen" class="overlay active">
                    <button id="play-button" class="btn btn-primary btn-glow btn-huge">▶</button>
                </div>

                <!-- Pause Screen -->
                <div id="pause-screen" class="overlay">
                    <button id="resume-button" class="btn btn-primary btn-glow btn-huge">▶</button>
                    <button id="restart-from-pause" class="btn btn-secondary btn-circle">🔄</button>
                </div>

                <!-- Game Over Screen -->
                <div id="game-over-screen" class="overlay">
                    <div class="gameover-icon">💀</div>
                    <div class="stats-summary">
                        <div class="stat-row">
                            <span class="score-icon">✨</span>
                            <span id="final-score" class="stat-val">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="diamond-icon">💎</span>
                            <span id="earned-diamonds" class="stat-val text-cyan">+0</span>
                        </div>
                    </div>
                    <button id="restart-button" class="btn btn-primary btn-glow btn-circle">🔄</button>
                </div>

                <!-- Cyclone Target Cursor overlay (hidden by default) -->
                <div id="cyclone-cursor" class="cyclone-aim-overlay">
                    <div class="cyclone-vortex-aim"></div>
                </div>
            </div>

            <!-- Choices Area (3 Drag-and-Drop options) -->
            <div class="choices-drawer">
                <div class="choice-slots">
                    <div class="choice-slot" id="choice-0">
                        <canvas id="choice-canvas-0" width="80" height="80"></canvas>
                    </div>
                    <div class="choice-slot" id="choice-1">
                        <canvas id="choice-canvas-1" width="80" height="80"></canvas>
                    </div>
                    <div class="choice-slot" id="choice-2">
                        <canvas id="choice-canvas-2" width="80" height="80"></canvas>
                    </div>
                </div>
            </div>

            <!-- Footer Toolbar -->
            <div class="footer-toolbar">
                <button id="pause-button" class="btn-circle" title="Oyunu Duraklat">
                    <span class="icon-pause">⏸</span>
                </button>
                
                <div class="powerup-buttons">
                    <button id="powerup-cyclone" class="btn-powerup" title="Kasırga - Kumları yok eder (70 Elmas)">
                        <div class="powerup-icon vortex-anim">🌀</div>
                        <div class="powerup-cost">💎 70</div>
                    </button>
                    
                    <button id="powerup-swap" class="btn-powerup" title="Şekil Değiştir (50 Elmas)">
                        <div class="powerup-icon swap-anim">🔄</div>
                        <div class="powerup-cost">💎 50</div>
                    </button>
                </div>

                <div class="diamond-counter">
                    <span class="diamond-icon">💎</span>
                    <span id="diamond-value" class="value">0</span>
                    <button id="btn-add-diamonds" class="btn-plus" title="Hediye Elmas Al">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/audio.js?v=5"></script>
    <script src="js/physics.js?v=5"></script>
    <script src="js/game.js?v=5"></script>
</body>
</html>
